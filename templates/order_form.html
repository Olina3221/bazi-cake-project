<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎂 八字蛋糕 ✦ 客製化填單</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans TC', 'PingFang TC', sans-serif;
      background: linear-gradient(135deg, #fdf6ec 0%, #fce4ec 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(200,100,80,.12);
      max-width: 560px;
      width: 100%;
      padding: 40px 36px 32px;
    }

    .header { text-align: center; margin-bottom: 32px; }
    .header .emoji { font-size: 2.6rem; display: block; margin-bottom: 6px; }
    .header h1 { font-size: 1.45rem; color: #4a2c2a; letter-spacing: .05em; }
    .header p  { font-size: .85rem; color: #a07060; margin-top: 6px; }

    .section-title {
      font-size: .78rem;
      font-weight: 700;
      color: #c97a5a;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin: 24px 0 10px;
      padding-left: 2px;
    }

    label {
      display: block;
      font-size: .88rem;
      color: #5a3a30;
      margin-bottom: 4px;
      font-weight: 500;
    }
    .required { color: #e06060; margin-left: 2px; }

    input[type="text"],
    input[type="tel"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e8d5c8;
      border-radius: 10px;
      font-size: .93rem;
      color: #3a2520;
      background: #fffaf8;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 14px;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #c97a5a;
      background: #fff;
    }
    textarea { resize: vertical; min-height: 72px; }

    /* 心願選項卡片 */
    .wish-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    .wish-card input[type="radio"] { display: none; }
    .wish-card label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px 8px;
      border: 1.5px solid #e8d5c8;
      border-radius: 12px;
      cursor: pointer;
      background: #fffaf8;
      transition: all .2s;
      text-align: center;
      font-size: .84rem;
      color: #5a3a30;
      line-height: 1.4;
      margin-bottom: 0;
    }
    .wish-card label .icon { font-size: 1.5rem; margin-bottom: 4px; }
    .wish-card input:checked + label {
      border-color: #c97a5a;
      background: #fff2ec;
      color: #c97a5a;
      font-weight: 700;
      box-shadow: 0 2px 10px rgba(201,122,90,.15);
    }
    .wish-card:last-child { grid-column: 1 / -1; }

    /* 心願細項（動態顯示） */
    .sub-wish-section { display: none; margin-bottom: 14px; }
    .sub-wish-section.visible { display: block; }

    .sub-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }
    .sub-card input[type="radio"] { display: none; }
    .sub-card label {
      display: block;
      padding: 8px 6px;
      border: 1.5px solid #e8d5c8;
      border-radius: 8px;
      cursor: pointer;
      background: #fffaf8;
      font-size: .78rem;
      color: #5a3a30;
      text-align: center;
      line-height: 1.35;
      margin-bottom: 0;
      transition: all .2s;
    }
    .sub-card input:checked + label {
      border-color: #c97a5a;
      background: #fff2ec;
      color: #c97a5a;
      font-weight: 700;
    }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #d4846a, #c97a5a);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .08em;
      cursor: pointer;
      margin-top: 24px;
      box-shadow: 0 4px 16px rgba(201,122,90,.3);
      transition: opacity .2s, transform .1s;
    }
    .btn-submit:hover  { opacity: .92; }
    .btn-submit:active { transform: scale(.98); }

    .note-text {
      font-size: .75rem;
      color: #b09080;
      text-align: center;
      margin-top: 14px;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <span class="emoji">🎂</span>
    <h1>八字蛋糕客製化填單</h1>
    <p>為你的命盤量身訂製，每一口都是能量</p>
  </div>

  <form action="/submit" method="POST">

    <!-- 基本資料 -->
    <div class="section-title">✦ 基本資料</div>

    <label>姓名 <span class="required">*</span></label>
    <input type="text" name="name" placeholder="你的名字或暱稱" required>

    <label>聯絡電話</label>
    <input type="tel" name="phone" placeholder="方便聯絡的電話（選填）">

    <!-- 生日 -->
    <div class="section-title">✦ 出生資料</div>

    <div class="row2">
      <div>
        <label>出生日期 <span class="required">*</span></label>
        <input type="date" name="birthday" required>
      </div>
      <div>
        <label>出生時辰（選填）</label>
        <select name="shichen">
          <option value="不填">── 不確定 ──</option>
          <option value="子時">子時 23:00–01:00</option>
          <option value="丑時">丑時 01:00–03:00</option>
          <option value="寅時">寅時 03:00–05:00</option>
          <option value="卯時">卯時 05:00–07:00</option>
          <option value="辰時">辰時 07:00–09:00</option>
          <option value="巳時">巳時 09:00–11:00</option>
          <option value="午時">午時 11:00–13:00</option>
          <option value="未時">未時 13:00–15:00</option>
          <option value="申時">申時 15:00–17:00</option>
          <option value="酉時">酉時 17:00–19:00</option>
          <option value="戌時">戌時 19:00–21:00</option>
          <option value="亥時">亥時 21:00–23:00</option>
        </select>
      </div>
    </div>

    <!-- 心願 -->
    <div class="section-title">✦ 許一個心願 <span class="required">*</span></div>

    <div class="wish-grid">
      <div class="wish-card">
        <input type="radio" name="wish_main" id="w_a" value="A. 感情桃花" required>
        <label for="w_a"><span class="icon">💕</span>感情桃花<br><small>找到另一半／更甜蜜</small></label>
      </div>
      <div class="wish-card">
        <input type="radio" name="wish_main" id="w_b" value="B. 事業突破">
        <label for="w_b"><span class="icon">🚀</span>事業突破<br><small>升職／創業／順利</small></label>
      </div>
      <div class="wish-card">
        <input type="radio" name="wish_main" id="w_c" value="C. 健康蛻變">
        <label for="w_c"><span class="icon">🌿</span>健康蛻變<br><small>瘦身／養生／發光</small></label>
      </div>
      <div class="wish-card">
        <input type="radio" name="wish_main" id="w_d" value="D. 財運豐收">
        <label for="w_d"><span class="icon">💰</span>財運豐收<br><small>加薪／投資／財庫</small></label>
      </div>
      <div class="wish-card">
        <input type="radio" name="wish_main" id="w_e" value="E. 平靜穩定">
        <label for="w_e"><span class="icon">🧘</span>平靜穩定<br><small>減壓／沉澱／內心平和</small></label>
      </div>
    </div>

    <!-- 心願細項 A -->
    <div class="sub-wish-section" id="sub_a">
      <label>細說你的心願：</label>
      <div class="sub-grid">
        <div class="sub-card"><input type="radio" name="wish_sub" id="a1" value="A1. 想吸引新對象"><label for="a1">想吸引<br>新對象</label></div>
        <div class="sub-card"><input type="radio" name="wish_sub" id="a2" value="A2. 感情更穩定"><label for="a2">感情<br>更穩定</label></div>
        <div class="sub-card"><input type="radio" name="wish_sub" id="a3" value="A3. 走出過去重新開始"><label for="a3">走出過去<br>重新開始</label></div>
      </div>
    </div>

    <!-- 心願細項 B -->
    <div class="sub-wish-section" id="sub_b">
      <label>細說你的心願：</label>
      <div class="sub-grid">
        <div class="sub-card"><input type="radio" name="wish_sub" id="b1" value="B1. 想被主管看見升職"><label for="b1">升職<br>被看見</label></div>
        <div class="sub-card"><input type="radio" name="wish_sub" id="b2" value="B2. 想開創新局創業"><label for="b2">開創<br>新局</label></div>
        <div class="sub-card"><input type="radio" name="wish_sub" id="b3" value="B3. 工作壓力大想順順的"><label for="b3">工作<br>順順的</label></div>
      </div>
    </div>

    <!-- 心願細項 C -->
    <div class="sub-wish-section" id="sub_c">
      <label>細說你的心願：</label>
      <div class="sub-grid">
        <div class="sub-card"><input type="radio" name="wish_sub" id="c1" value="C1. 想瘦身輕盈"><label for="c1">瘦身<br>輕盈</label></div>
        <div class="sub-card"><input type="radio" name="wish_sub" id="c2" value="C2. 想體力變好"><label for="c2">體力<br>變好</label></div>
        <div class="sub-card"><input type="radio" name="wish_sub" id="c3" value="C3. 由內而外發光"><label for="c3">由內而外<br>發光</label></div>
      </div>
    </div>

    <!-- 心願細項 D -->
    <div class="sub-wish-section" id="sub_d">
      <label>細說你的心願：</label>
      <div class="sub-grid">
        <div class="sub-card"><input type="radio" name="wish_sub" id="d1" value="D1. 想加薪或獎金"><label for="d1">加薪<br>獎金</label></div>
        <div class="sub-card"><input type="radio" name="wish_sub" id="d2" value="D2. 想投資順利"><label for="d2">投資<br>順利</label></div>
        <div class="sub-card"><input type="radio" name="wish_sub" id="d3" value="D3. 累積長期財庫"><label for="d3">累積<br>財庫</label></div>
      </div>
    </div>

    <!-- 心願細項 E -->
    <div class="sub-wish-section" id="sub_e">
      <label>細說你的心願：</label>
      <div class="sub-grid">
        <div class="sub-card"><input type="radio" name="wish_sub" id="e1" value="E1. 工作壓力太大"><label for="e1">工作<br>壓力大</label></div>
        <div class="sub-card"><input type="radio" name="wish_sub" id="e2" value="E2. 感情家庭困擾"><label for="e2">感情<br>家庭</label></div>
        <div class="sub-card"><input type="radio" name="wish_sub" id="e3" value="E3. 找回自己的節奏"><label for="e3">找回<br>自己</label></div>
      </div>
    </div>

    <!-- 備註 -->
    <div class="section-title">✦ 備註（選填）</div>
    <textarea name="note" placeholder="過敏食材、特殊需求、想對蛋糕說的話…"></textarea>

    <button type="submit" class="btn-submit">🎂 送出我的心願單</button>
    <p class="note-text">填單資料僅用於製作專屬蛋糕，不作其他用途。</p>
  </form>
</div>

<script>
  // 心願主項切換細項顯示
  const wishMap = { 'A. 感情桃花': 'sub_a', 'B. 事業突破': 'sub_b', 'C. 健康蛻變': 'sub_c', 'D. 財運豐收': 'sub_d', 'E. 平靜穩定': 'sub_e' };
  document.querySelectorAll('input[name="wish_main"]').forEach(radio => {
    radio.addEventListener('change', () => {
      // 隱藏所有細項
      document.querySelectorAll('.sub-wish-section').forEach(el => el.classList.remove('visible'));
      // 清空細項選擇
      document.querySelectorAll('input[name="wish_sub"]').forEach(el => el.checked = false);
      // 顯示對應細項
      const target = wishMap[radio.value];
      if (target) document.getElementById(target).classList.add('visible');
    });
  });
</script>
</body>
</html>
