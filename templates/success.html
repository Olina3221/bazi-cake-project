<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎂 填單成功！</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', 'PingFang TC', sans-serif;
      background: linear-gradient(135deg, #fdf6ec 0%, #fce4ec 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(200,100,80,.12);
      max-width: 460px; width: 100%;
      padding: 48px 36px;
      text-align: center;
    }
    .icon { font-size: 3.5rem; display: block; margin-bottom: 12px; }
    h1 { font-size: 1.5rem; color: #4a2c2a; margin-bottom: 10px; }
    p  { font-size: .92rem; color: #8a6050; line-height: 1.7; }
    .order-id {
      display: inline-block;
      background: #fff2ec;
      color: #c97a5a;
      font-weight: 700;
      font-size: .85rem;
      padding: 4px 14px;
      border-radius: 20px;
      margin: 12px 0 20px;
      letter-spacing: .05em;
    }
    .btn-back {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 28px;
      background: linear-gradient(135deg, #d4846a, #c97a5a);
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-size: .9rem;
      font-weight: 700;
      letter-spacing: .06em;
      box-shadow: 0 4px 14px rgba(201,122,90,.25);
    }
  </style>
</head>
<body>
<div class="card">
  <span class="icon">🎉</span>
  <h1>心願單已收到！</h1>
  <div class="order-id">訂單編號 #{{ order_id }}</div>
  <p>謝謝 <strong>{{ name }}</strong> 許下心願 🌸<br>師傅會仔細分析你的八字，<br>為你準備最適合的那一口甜蜜。</p>
  <a href="/" class="btn-back">← 再填一張</a>
</div>
</body>
</html>
